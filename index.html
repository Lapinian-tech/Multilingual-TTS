<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multilingual TTS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  :root {
    --bg:#0e0e11;--surface:#16161a;--border:#2a2a32;
    --accent:#7c6aff;--accent2:#ff6a8a;--text:#e8e8f0;
    --muted:#6b6b80;--green:#4ade80;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
  header{text-align:center;margin-bottom:32px;}
  .logo{font-size:10px;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  h1{font-size:26px;font-weight:300;letter-spacing:.04em;color:var(--text);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    width:100%;max-width:720px;padding:22px 24px;margin-bottom:14px;}
  .card-label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;
    font-size:14px;line-height:1.8;padding:14px;resize:vertical;min-height:130px;
    outline:none;transition:border-color .2s;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);}

  /* ── Language slots ── */
  .slots-wrap{display:flex;flex-direction:column;gap:8px;}
  .slot{display:flex;align-items:center;gap:8px;padding:10px 12px;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    transition:border-color .15s;cursor:grab;user-select:none;}
  .slot:active{cursor:grabbing;}
  .slot.dragging{opacity:.4;}
  .slot.drag-over{border-color:var(--accent);}
  .slot-num{font-size:11px;color:var(--muted);min-width:16px;text-align:center;}
  .slot-drag{font-size:14px;color:var(--muted);cursor:grab;padding:0 2px;flex-shrink:0;}
  .slot select{background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-family:'DM Mono',monospace;font-size:11px;
    padding:5px 8px;outline:none;cursor:pointer;flex:1;}
  .slot select:focus{border-color:var(--accent);}
  .slot-voice-sel{max-width:200px;flex:1.2;}
  .slot-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .slot-remove{background:transparent;border:none;color:var(--muted);cursor:pointer;
    font-size:14px;padding:2px 4px;line-height:1;transition:color .15s;flex-shrink:0;}
  .slot-remove:hover{color:var(--accent2);}
  .add-slot-btn{width:100%;background:transparent;border:1px dashed var(--border);
    border-radius:8px;padding:9px;font-family:'DM Mono',monospace;font-size:11px;
    letter-spacing:.1em;color:var(--muted);cursor:pointer;text-transform:uppercase;
    transition:all .15s;margin-top:4px;}
  .add-slot-btn:hover{border-color:var(--accent);color:var(--accent);}
  .add-slot-btn:disabled{opacity:.3;cursor:not-allowed;}

  /* ── Controls ── */
  .controls{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;
    padding:10px 22px;border-radius:6px;border:none;cursor:pointer;
    transition:all .15s;text-transform:uppercase;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover:not(:disabled){background:#6a58ee;transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-stop{background:transparent;color:var(--accent2);border:1px solid var(--accent2);display:none;}
  .btn-stop:hover{background:var(--accent2);color:#fff;}
  .btn-stop.visible{display:inline-block;}
  .speed-group{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .speed-group label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  input[type=range]{-webkit-appearance:none;width:90px;height:3px;
    background:var(--border);border-radius:2px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
    border-radius:50%;background:var(--accent);cursor:pointer;}
  .speed-val{font-size:11px;color:var(--accent);min-width:28px;}
  .error-msg{color:var(--accent2);font-size:11px;margin-top:8px;}

  /* ── Status ── */
  .status-bar{width:100%;max-width:720px;height:3px;background:var(--border);
    border-radius:2px;margin-bottom:12px;overflow:hidden;}
  .status-fill{height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s;}
  .status-fill.speaking{background:var(--accent);animation:pulse .8s ease-in-out infinite;}
  .status-fill.done{background:var(--green);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .status-label{width:100%;max-width:720px;font-size:11px;letter-spacing:.12em;
    color:var(--muted);margin-bottom:16px;min-height:16px;}
  .speaking-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);margin-right:6px;
    animation:blink .6s ease-in-out infinite;vertical-align:middle;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

  /* ── Segment preview ── */
  .seg-item{display:flex;align-items:center;gap:10px;padding:5px 0;
    border-bottom:1px solid var(--border);font-size:12px;}
  .seg-item:last-child{border-bottom:none;}
  .seg-badge{font-size:9px;letter-spacing:.15em;padding:2px 7px;border-radius:3px;
    flex-shrink:0;font-weight:500;border:1px solid;}
  .seg-text{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:540px;}
  .seg-item.seg-active .seg-text{color:var(--text);}

  /* ── Playback order preview ── */
  .order-preview{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .order-chip{font-size:10px;letter-spacing:.08em;padding:3px 10px;border-radius:20px;
    border:1px solid;white-space:nowrap;}
  .order-arrow{color:var(--muted);font-size:12px;}
</style>
</head>
<body>

<header>
  <div class="logo">Multilingual TTS</div>
  <h1 id="h1title">English ⇄ 日本語</h1>
</header>

<!-- Input -->
<div class="card">
  <div class="card-label">Text — 複数言語混在 OK</div>
  <textarea id="inputText"
    placeholder="複数言語を混在してペーストできます。固有文字は自動検出されます。&#10;&#10;e.g.&#10;The quick brown fox jumps over the lazy dog.&#10;日本語の文章をここに入力してください。&#10;Le renard brun rapide saute par-dessus le chien paresseux.&#10;Привет, мир! مرحباً بالعالم"></textarea>
  <div id="errorMsg" class="error-msg"></div>
</div>

<!-- Language slots -->
<div class="card">
  <div class="card-label">読み上げ言語 — 最大5言語・ドラッグで順番変更</div>
  <div class="slots-wrap" id="slotsWrap"></div>
  <button class="add-slot-btn" id="addSlotBtn" onclick="addSlot()">＋ 言語を追加</button>
  <div class="order-preview" id="orderPreview"></div>
</div>

<!-- Controls -->
<div class="card" style="padding:16px 24px;">
  <div class="controls" style="margin-top:0;">
    <button class="btn btn-primary" id="playBtn" onclick="startReading()">▶ Play</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopAll()">■ Stop</button>
    <div class="speed-group">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="0.5" max="1.8" step="0.05" value="1.0" oninput="updateSpeed(this.value)">
      <span class="speed-val" id="speedVal">1.0×</span>
    </div>
  </div>
</div>

<div class="status-bar"><div class="status-fill" id="statusFill"></div></div>
<div class="status-label" id="statusLabel"></div>

<div class="card" id="previewCard" style="display:none;">
  <div class="card-label">検出セグメント</div>
  <div id="segmentList"></div>
</div>

<script>
// ── Language definitions ─────────────────────────────────────────────────────
const LANG_DEFS = [
  // Auto-detected (unique scripts)
  // IMPORTANT: Order matters for CJK disambiguation
  // 1. Korean: Hangul is unique
  { code:'ko-KR', label:'韓国語',        re:/[\uAC00-\uD7AF\u1100-\u11FF\u3130-\u318F]/ },
  // 2. Japanese: kana (hiragana/katakana) are unique to Japanese
  { code:'ja-JP', label:'日本語',        re:/[\u3040-\u309F\u30A0-\u30FF]/ },
  // 3. Chinese Traditional: unique CJK extension + compatibility ideographs
  { code:'zh-TW', label:'中国語（繁）',  re:/[\uF900-\uFAFF\u2F00-\u2FDF]/ },
  // 4. Chinese Simplified: CJK unified ideographs (fallback after ja/ko/zh-TW)
  { code:'zh-CN', label:'中国語（簡）',  re:/[\u4E00-\u9FFF\u3400-\u4DBF]/ },
  { code:'ar-SA', label:'アラビア語',    re:/[\u0600-\u06FF]/ },
  { code:'he-IL', label:'ヘブライ語',    re:/[\u0590-\u05FF]/ },
  { code:'hi-IN', label:'ヒンディー語', re:/[\u0900-\u097F]/ },
  { code:'bn-BD', label:'ベンガル語',    re:/[\u0980-\u09FF]/ },
  { code:'ta-IN', label:'タミル語',      re:/[\u0B80-\u0BFF]/ },
  { code:'te-IN', label:'テルグ語',      re:/[\u0C00-\u0C7F]/ },
  { code:'th-TH', label:'タイ語',        re:/[\u0E00-\u0E7F]/ },
  { code:'my-MM', label:'ミャンマー語', re:/[\u1000-\u109F]/ },
  { code:'km-KH', label:'クメール語',    re:/[\u1780-\u17FF]/ },
  { code:'ru-RU', label:'ロシア語',      re:/[\u0400-\u04FF]/ },
  { code:'el-GR', label:'ギリシャ語',    re:/[\u0370-\u03FF]/ },
  { code:'ka-GE', label:'ジョージア語', re:/[\u10A0-\u10FF]/ },
  { code:'hy-AM', label:'アルメニア語', re:/[\u0530-\u058F]/ },
  { code:'am-ET', label:'アムハラ語',    re:/[\u1200-\u137F]/ },
  // Latin-script (manual only)
  { code:'en-US', label:'英語（US）',    re:null },
  { code:'en-GB', label:'英語（UK）',    re:null },
  { code:'fr-FR', label:'フランス語',    re:null },
  { code:'de-DE', label:'ドイツ語',      re:null },
  { code:'es-ES', label:'スペイン語',    re:null },
  { code:'es-MX', label:'スペイン語（墨）', re:null },
  { code:'pt-BR', label:'ポルトガル語（伯）', re:null },
  { code:'pt-PT', label:'ポルトガル語', re:null },
  { code:'it-IT', label:'イタリア語',    re:null },
  { code:'nl-NL', label:'オランダ語',    re:null },
  { code:'pl-PL', label:'ポーランド語', re:null },
  { code:'sv-SE', label:'スウェーデン語', re:null },
  { code:'no-NO', label:'ノルウェー語', re:null },
  { code:'da-DK', label:'デンマーク語', re:null },
  { code:'fi-FI', label:'フィンランド語', re:null },
  { code:'tr-TR', label:'トルコ語',      re:null },
  { code:'id-ID', label:'インドネシア語', re:null },
  { code:'ms-MY', label:'マレー語',      re:null },
  { code:'vi-VN', label:'ベトナム語',    re:null },
  { code:'cs-CZ', label:'チェコ語',      re:null },
  { code:'hu-HU', label:'ハンガリー語', re:null },
  { code:'ro-RO', label:'ルーマニア語', re:null },
  { code:'uk-UA', label:'ウクライナ語', re:null },
];

// Slot colors
const SLOT_COLORS = ['#a0c4ff','#ffd6a5','#b9fbc0','#ffafcc','#cdb4db'];

// ── Slot state ───────────────────────────────────────────────────────────────
// Each slot: { id, langCode, voiceName }
let slots = [
  { id:1, langCode:'en-US', voiceName:'' },
  { id:2, langCode:'ja-JP', voiceName:'' },
];
let nextId = 3;
let allVoices = [];
let currentRate = 1.0;
let stopped = false;
let dragSrcIdx = null;

// ── Voice loading ────────────────────────────────────────────────────────────
function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  initSlotVoices();
  renderSlots();
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ── Slot rendering ───────────────────────────────────────────────────────────
function getVoicesForCode(code) {
  return allVoices.filter(v => v.lang === code || v.lang.startsWith(code.split('-')[0]+'-'));
}

function buildLangOptions(selectedCode) {
  return LANG_DEFS.map(l =>
    `<option value="${l.code}" ${l.code === selectedCode ? 'selected' : ''}>${l.label} (${l.code})</option>`
  ).join('');
}

function buildVoiceOptions(code, selectedName) {
  const vs = getVoicesForCode(code);
  if (!vs.length) return '<option value="">— no voice —</option>';
  // Default to first available voice for this language
  const effective = selectedName || (vs.length ? vs[0].name : '');
  return vs.map(v =>
    `<option value="${v.name}" ${v.name === effective ? 'selected' : ''}>${v.name.replace(/\(.*\)/,'').trim()}</option>`
  ).join('');
}

function initSlotVoices() {
  slots.forEach(slot => {
    if (!slot.voiceName) {
      const vs = getVoicesForCode(slot.langCode);
      if (vs.length) slot.voiceName = vs[0].name;
    }
  });
}

function renderSlots() {
  const wrap = document.getElementById('slotsWrap');
  wrap.innerHTML = '';
  slots.forEach((slot, idx) => {
    const color = SLOT_COLORS[idx % SLOT_COLORS.length];
    const div = document.createElement('div');
    div.className = 'slot';
    div.draggable = true;
    div.dataset.idx = idx;
    div.innerHTML = `
      <span class="slot-drag" title="ドラッグで並び替え">⠿</span>
      <span class="slot-num">${idx + 1}</span>
      <span class="slot-color" style="background:${color};"></span>
      <select class="slot-lang-sel" onchange="onLangChange(${idx}, this.value)">
        ${buildLangOptions(slot.langCode)}
      </select>
      <select class="slot-voice-sel" onchange="onVoiceChange(${idx}, this.value)">
        ${buildVoiceOptions(slot.langCode, slot.voiceName)}
      </select>
      ${slots.length > 1 ? `<button class="slot-remove" onclick="removeSlot(${idx})" title="削除">✕</button>` : ''}
    `;
    // Drag events
    div.addEventListener('dragstart', e => { dragSrcIdx = idx; div.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    div.addEventListener('dragend', () => { div.classList.remove('dragging'); document.querySelectorAll('.slot').forEach(s=>s.classList.remove('drag-over')); });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === idx) return;
      const moved = slots.splice(dragSrcIdx, 1)[0];
      slots.splice(idx, 0, moved);
      dragSrcIdx = null;
      renderSlots();
      rebuildPreview();
    });
    wrap.appendChild(div);
  });
  document.getElementById('addSlotBtn').disabled = slots.length >= 5;
  updateOrderPreview();
  updateTitle();
}

function onLangChange(idx, code) {
  slots[idx].langCode = code;
  // Auto-select first available voice for new language
  const vs = getVoicesForCode(code);
  slots[idx].voiceName = vs.length ? vs[0].name : '';
  renderSlots();
  rebuildPreview();
}

function onVoiceChange(idx, name) {
  slots[idx].voiceName = name;
}

function addSlot() {
  if (slots.length >= 5) return;
  const used = new Set(slots.map(s => s.langCode));
  const next = LANG_DEFS.find(l => !used.has(l.code));
  const code = next ? next.code : 'en-US';
  const vs = getVoicesForCode(code);
  slots.push({ id: nextId++, langCode: code, voiceName: vs.length ? vs[0].name : '' });
  renderSlots();
  rebuildPreview();
}

function removeSlot(idx) {
  if (slots.length <= 1) return;
  slots.splice(idx, 1);
  renderSlots();
  rebuildPreview();
}

function updateOrderPreview() {
  const container = document.getElementById('orderPreview');
  container.innerHTML = '';
  slots.forEach((s, i) => {
    const color = SLOT_COLORS[i % SLOT_COLORS.length];
    const def = LANG_DEFS.find(l => l.code === s.langCode);
    const chip = document.createElement('span');
    chip.className = 'order-chip';
    chip.style.cssText = `color:${color};border-color:${color}44;background:${color}14;`;
    chip.textContent = def ? def.label : s.langCode;
    container.appendChild(chip);
    if (i < slots.length - 1) {
      const arr = document.createElement('span');
      arr.className = 'order-arrow';
      arr.textContent = '→';
      container.appendChild(arr);
    }
  });
}

function updateTitle() {
  const labels = slots.map((s, i) => {
    const def = LANG_DEFS.find(l => l.code === s.langCode);
    const color = SLOT_COLORS[i % SLOT_COLORS.length];
    return `<span style="color:${color}">${def ? def.label : s.langCode}</span>`;
  });
  document.getElementById('h1title').innerHTML = labels.join('<span style="color:var(--muted);margin:0 8px;">⇄</span>');
}

// ── Language detection ────────────────────────────────────────────────────────
// 1. Try all unique-script langs in LANG_DEFS (not just slots)
// 2. If detected lang is in a slot → use that slot's code
// 3. If detected but not in slots → still use it (will use system voice)
// 4. Fallback for latin text → cycle through slots in order
let latinSlotIdx = 0; // tracks which latin slot to assign next

function detectLang(text) {
  // Try all unique-script entries
  for (const def of LANG_DEFS) {
    if (def.re && def.re.test(text)) return def.code;
  }
  return null; // latin
}

function buildSegments(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  const segs = [];
  latinSlotIdx = 0; // reset latin counter per parse

  // Build latin slots list (slots whose lang has no unique script)
  const latinSlots = slots.filter(s => {
    const def = LANG_DEFS.find(l => l.code === s.langCode);
    return def && !def.re;
  });

  for (const line of lines) {
    const detected = detectLang(line);
    let code;

    if (detected) {
      // Unique-script detected: check if that language is in a slot
      const slotMatch = slots.find(s => s.langCode === detected);
      // Also check base lang match (e.g. zh-CN for zh)
      const baseMatch = slots.find(s => s.langCode.startsWith(detected.split('-')[0]));
      code = slotMatch ? slotMatch.langCode : (baseMatch ? baseMatch.langCode : detected);
    } else {
      // Latin text: assign to latin slots in rotation
      if (latinSlots.length > 0) {
        code = latinSlots[latinSlotIdx % latinSlots.length].langCode;
        latinSlotIdx++;
      } else {
        code = slots[0].langCode;
      }
    }

    // Merge adjacent same-language
    if (segs.length > 0 && segs[segs.length - 1].code === code) {
      segs[segs.length - 1].text += ' ' + line;
    } else {
      const slotIdx = slots.findIndex(s => s.langCode === code);
      const color = SLOT_COLORS[slotIdx >= 0 ? slotIdx % SLOT_COLORS.length : 0];
      const def = LANG_DEFS.find(l => l.code === code);
      segs.push({ code, text: line, label: def ? def.label : code, color });
    }
  }
  return segs;
}

let currentSegments = [];

function rebuildPreview() {
  currentSegments = buildSegments(document.getElementById('inputText').value);
  const card = document.getElementById('previewCard');
  const list = document.getElementById('segmentList');
  if (!currentSegments.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = currentSegments.map((s, i) =>
    `<div class="seg-item" id="seg-${i}">
      <span class="seg-badge" style="color:${s.color};border-color:${s.color}33;background:${s.color}18;">${s.label}</span>
      <span class="seg-text">${(s.text.length > 72 ? s.text.slice(0,72)+'…' : s.text)}</span>
    </div>`
  ).join('');
}

document.getElementById('inputText').addEventListener('input', rebuildPreview);

// ── TTS ──────────────────────────────────────────────────────────────────────
function getVoiceForSlot(code) {
  // First: check if slot has explicit voice selected
  const slot = slots.find(s => s.langCode === code);
  if (slot && slot.voiceName) {
    const named = allVoices.find(v => v.name === slot.voiceName);
    if (named) return named;
  }
  // Fallback: exact lang code match
  const exact = allVoices.find(v => v.lang === code);
  if (exact) return exact;
  // Fallback: base language match (e.g. 'fr' for 'fr-FR')
  const base = code.split('-')[0];
  return allVoices.find(v => v.lang.startsWith(base)) || null;
}

function speak(text, code) {
  return new Promise((resolve, reject) => {
    if (stopped) { reject('stopped'); return; }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = code;
    utt.rate = currentRate;
    const v = getVoiceForSlot(code);
    if (v) utt.voice = v;
    utt.onend = resolve;
    utt.onerror = e => { if (e.error !== 'interrupted') reject(e); else resolve(); };
    window.speechSynthesis.speak(utt);
  });
}

function updateSpeed(v) {
  currentRate = parseFloat(v);
  document.getElementById('speedVal').textContent = parseFloat(v).toFixed(2).replace(/\.?0+$/,'')+'×';
}

function setStatus(label, pct, phase) {
  const f = document.getElementById('statusFill');
  f.className = 'status-fill '+(phase||'');
  f.style.width = pct+'%';
  document.getElementById('statusLabel').innerHTML = label;
}

function showError(m) { document.getElementById('errorMsg').textContent = m; }

function highlightSeg(i) {
  document.querySelectorAll('.seg-item').forEach((el,j) =>
    el.classList.toggle('seg-active', j===i));
}

async function startReading() {
  const raw = document.getElementById('inputText').value.trim();
  if (!raw) { showError('テキストを入力してください'); return; }
  currentSegments = buildSegments(raw);
  if (!currentSegments.length) return;

  stopped = false;
  showError('');
  document.getElementById('playBtn').disabled = true;
  document.getElementById('stopBtn').classList.add('visible');

  try {
    for (let i = 0; i < currentSegments.length; i++) {
      if (stopped) break;
      const seg = currentSegments[i];
      const pct = Math.round(((i+1)/currentSegments.length)*90);
      setStatus(
        `<span class="speaking-dot" style="background:${seg.color}"></span>${seg.label} (${i+1}/${currentSegments.length})`,
        pct, 'speaking'
      );
      highlightSeg(i);
      await speak(seg.text, seg.code);
    }
    if (!stopped) {
      setStatus('✓ Done', 100, 'done');
      highlightSeg(-1);
      setTimeout(()=>setStatus('',0,''), 2500);
    }
  } catch(e) {
    if (e !== 'stopped') showError('エラー: '+(e.message||e));
    setStatus('',0,'');
  } finally {
    document.getElementById('playBtn').disabled = false;
    document.getElementById('stopBtn').classList.remove('visible');
  }
}

function stopAll() {
  stopped = true;
  window.speechSynthesis.cancel();
  document.getElementById('playBtn').disabled = false;
  document.getElementById('stopBtn').classList.remove('visible');
  setStatus('',0,'');
  highlightSeg(-1);
}

// Initial render
renderSlots();
</script>
</body>
</html>
